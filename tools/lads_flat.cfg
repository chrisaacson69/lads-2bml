# ld65 config: emit a flat binary of the LADS image starting at the C64 origin $2AF8.
# fill=no so the output holds only assembled bytes (we diff a prefix vs the oracle).
MEMORY {
    RAM: start = $2AF8, size = $2000, type = rw, file = %O, fill = no;
}
SEGMENTS {
    CODE: load = RAM, type = rw, start = $2AF8;
}
